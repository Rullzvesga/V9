<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reseller Panel - Vortex Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b14;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .dragon-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 25rem;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            animation: dragonFloat 6s ease-in-out infinite, dragonPulse 3s infinite alternate;
            filter: drop-shadow(0 0 15px #ff5500);
            white-space: nowrap;
        }

        @keyframes dragonFloat {
            0% {
                transform: translate(-50%, -50%) translateY(0px) rotate(-2deg);
            }
            50% {
                transform: translate(-50%, -50%) translateY(-25px) rotate(2deg);
            }
            100% {
                transform: translate(-50%, -50%) translateY(0px) rotate(-2deg);
            }
        }

        @keyframes dragonPulse {
            0% {
                text-shadow: 0 0 5px #ff6600;
                opacity: 0.18;
            }
            100% {
                text-shadow: 0 0 25px #ff9900;
                opacity: 0.28;
            }
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: #0e0f1a;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2a3a;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .sub {
            text-align: center;
            font-size: 0.85rem;
            color: #ccccdd;
            margin-bottom: 32px;
        }

        .card {
            background: #12131e;
            border-radius: 28px;
            padding: 22px 20px;
            margin-bottom: 28px;
            border: 1px solid #2a2b3a;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 14px 18px;
            background: #1a1b2a;
            border: 1px solid #3a3b4a;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            margin-bottom: 14px;
            outline: none;
            transition: 0.2s;
        }

        input::placeholder {
            color: #aaa;
        }

        input:focus,
        select:focus {
            border-color: #ff7a92;
            box-shadow: 0 0 8px rgba(255, 90, 120, 0.3);
        }

        button {
            width: 100%;
            background: #ff3b5c;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 8px;
        }

        button:active {
            transform: scale(0.97);
            background: #e62e4f;
        }

        .user-list {
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-list::-webkit-scrollbar {
            width: 5px;
        }
        .user-list::-webkit-scrollbar-track {
            background: #1a1b2a;
            border-radius: 5px;
        }
        .user-list::-webkit-scrollbar-thumb {
            background: #ff7a92;
            border-radius: 5px;
        }

        .user-item {
            background: #181927;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2f3040;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
            color: white;
        }

        .role-badge {
            background: #ff3b5c;
            display: inline-block;
            width: fit-content;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            letter-spacing: 0.5px;
        }

        .delete-btn {
            background: #2e2e42;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.75rem;
            width: auto;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            transition: 0.15s;
        }

        .delete-btn:hover {
            background: #4a2a3a;
        }

        .delete-btn:active {
            transform: scale(0.94);
        }

        .loading,
        .empty {
            text-align: center;
            padding: 30px;
            color: #ccc;
            font-style: italic;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1f2c;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border: 1px solid #ff7a92;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        @media (max-width: 550px) {
            .container {
                padding: 20px 18px;
            }
            .user-item {
                flex-wrap: wrap;
                gap: 10px;
            }
            .delete-btn {
                margin-left: auto;
            }
            .dragon-bg {
                font-size: 18rem;
            }
        }
    </style>
</head>
<body>

    <div class="dragon-bg">🐉</div>

    <div class="container">
        <h2>VORTEX Guard</h2>
        <div class="sub">Developer by : Rullz</div>

        <div class="card">
            <h3><span></span> Buat Akun Baru</h3>
            <input type="text" id="newUsername" placeholder="Username">
            <input type="password" id="newPassword" placeholder="Password">
            <select id="newRole">
                <option value="member">Member</option>
                <option value="reseller">Reseller</option>
                <option value="admin">Admin</option>
                <option value="boss">Boss</option> <!-- BARU: tambahan role BOSS -->
            </select>
            <button onclick="createAccount()">Buat Akun</button>
        </div>

        <div class="card">
            <h3><span></span> Daftar Akun</h3>
            <div id="userList" class="user-list">
                <div class="loading">loading...</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBUhXZ_YKmTQNsDzeWX0072Zfb9lVi4jfE",
            databaseURL: "https://rullzxrat-default-rtdb.firebaseio.com",
            projectId: "rullzxrat",
            storageBucket: "rullzxrat.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const usersRef = db.ref("/users");

        // ===== TOAST =====
        function toast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = isError ? '#3a1e2a' : '#1e2a2e';
            t.style.color = '#fff';
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ===== LOAD USER LIST =====
        async function loadUserList() {
            const container = document.getElementById('userList');
            container.innerHTML = '<div class="loading">⏳ Loading...</div>';
            try {
                const snapshot = await usersRef.once('value');
                const users = snapshot.val();
                if (!users) {
                    container.innerHTML = '<div class="empty">📭 Belum ada akun</div>';
                    return;
                }
                let html = '';
                for (let id in users) {
                    const u = users[id];
                    const userIdAttr = JSON.stringify(id);
                    html += `
                                <div class="user-item">
                                    <div class="user-info">
                                        <div class="user-name">${escapeHtml(u.username)}</div>
                                        <span class="role-badge">${escapeHtml(u.role)}</span>
                                    </div>
                                    <button class="delete-btn" data-userid=${userIdAttr}>Hapus</button>
                                </div>
                            `;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error('Load error:', err);
                container.innerHTML = '<div class="empty">⚠️ Gagal memuat data</div>';
                toast('Error load data', true);
            }
        }

        // ===== DELETE ACCOUNT =====
        async function deleteAccount(userId) {
            if (!userId) {
                toast('ID akun tidak valid', true);
                return;
            }
            if (!confirm('Hapus akun ini? Tindakan permanen.')) return;

            try {
                await usersRef.child(userId).remove();
                toast('✅ Akun dihapus');
                loadUserList();
            } catch (err) {
                console.error('Delete error:', err);
                toast('❌ Gagal hapus akun', true);
            }
        }

        // ===== EVENT DELEGATION untuk tombol hapus =====
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('userList');
            container.addEventListener('click', function(e) {
                const btn = e.target.closest('.delete-btn');
                if (!btn) return;
                const userId = btn.getAttribute('data-userid');
                if (userId) {
                    deleteAccount(userId);
                } else {
                    toast('❌ Data user tidak ditemukan', true);
                }
            });
        });

        // ===== CREATE ACCOUNT =====
        window.createAccount = async function() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const role = document.getElementById('newRole').value;

            if (!username || !password) {
                toast('Username & password harus diisi', true);
                return;
            }
            if (username.length < 3) {
                toast('Username terlalu pendek (min 3 karakter)', true);
                return;
            }

            try {
                const check = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (check.exists()) {
                    toast('Username sudah terdaftar!', true);
                    return;
                }
                await usersRef.push().set({
                    username: username,
                    password: password,
                    role: role,
                    created_at: Date.now()
                });
                toast(`🎉 Akun ${role} berhasil dibuat`);
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newRole').value = 'member';
                loadUserList();
            } catch (err) {
                console.error('Create error:', err);
                toast('Gagal membuat akun', true);
            }
        };

        // ===== START =====
        loadUserList();
    </script>
</body>
</html>
